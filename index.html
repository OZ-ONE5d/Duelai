<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ユベル展開シミュレーション</title>
<style>
body{
font-family:sans-serif;
max-width:900px;
margin:40px auto;
line-height:1.8;
}
.box{
border:1px solid #ccc;
padding:20px;
margin-top:20px;
}
button{
padding:12px 20px;
font-size:16px;
}
#output{
white-space:pre-line;
}
</style>
</head>
<body>

<h1>ユベル展開シミュレーター（研究用試作）</h1>

<h2>初手</h2>

<label>
<input type="checkbox" id="lotus" checked>
Samsara D Lotus
</label><br>

<label>
<input type="checkbox" id="spirit">
Spirit of Yubel
</label><br>

<label>
<input type="checkbox" id="throne" checked>
Nightmare Throne
</label>

<h2>相手はどこでうららを撃つ？</h2>

<select id="ashTarget">
<option value="none">撃たれない</option>
<option value="lotus">Dロータスにうらら</option>
<option value="throne">ナイトメアスローンにうらら</option>
</select>

<br><br>

<button onclick="simulate()">
展開シミュレーション
</button>

<div class="box" id="output">
結果がここに表示されます
</div>

<script src="app.js"></script>

</body>
</html>
