<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ユベルAI（最終版）</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

h2 {
  margin-bottom: 10px;
}

.section {
  margin-bottom: 20px;
}

label {
  display: block;
  margin: 3px 0;
}

button {
  padding: 6px 12px;
  font-size: 14px;
}

pre {
  background: #f4f4f4;
  padding: 10px;
  white-space: pre-wrap;
  border: 1px solid #ccc;
}
</style>

</head>
<body>

<h2>ユベルAI（対誘発シミュレーター）</h2>

<div class="section">
  <h3>自分の手札</h3>
  <div id="cards"></div>
</div>

<div class="section">
  <h3>相手の手札誘発（複数選択）</h3>
  <div id="enemy"></div>
</div>

<button onclick="evaluateHand()">評価する</button>

<div class="section">
  <h3>評価</h3>
  <pre id="result">ここに評価が表示されます</pre>
</div>

<div class="section">
  <h3>展開ログ</h3>
  <pre id="route">ここに展開ルートが表示されます</pre>
</div>

<script src="app.js"></script>

</body>
</html>
